<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist Demo - US Med Spa</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #D4AF37;
            /* Premium Gold */
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Premium AI Voice Architecture</h1>
        <p>Aesthetic Clinic AI Receptionist deployed. <br><br>Click the <b>phone icon</b> in the bottom right corner to
            test the <800ms latency.</p>
    </div>

    <script>
        var vapiInstance = null;
        const assistant = "3da81165-c00c-4e14-a940-9dd2f07b3e9f"; // Ye tumhara Assistant ID hai
        const apiKey = "d75463f5-8882-4648-8825-5159c90f5d5f"; // ⚠️ WARNING: API Keys tab se apni Public Key copy karke yahan paste karo

        (function (d, t) {
            var g = d.createElement(t),
                s = d.getElementsByTagName(t)[0];
            g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            g.defer = true;
            g.async = true;
            s.parentNode.insertBefore(g, s);
            g.onload = function () {
                vapiInstance = window.vapiSDK.run({
                    apiKey: apiKey,
                    assistant: assistant,
                    config: {}
                });
            };
        })(document, "script");
    </script>
</body>

</html>
